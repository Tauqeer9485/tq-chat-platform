version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tq_chat
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat-network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - chat-network

  messaging-server:
    build:
      context: ./services/messaging-server
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "8080:8080"
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tq_chat
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      MEDIA_SERVER_URL: http://media-server:3001
      RTC_SERVER_URL: http://rtc-server:3002
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
      - redis
    networks:
      - chat-network

  media-server:
    build:
      context: ./services/media-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - media_uploads:/app/uploads
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tq_chat
      DB_USER: admin
      DB_PASSWORD: password
      JWKS_URI: http://messaging-server:8081/api/auth/.well-known/jwks.json
      JWT_AUDIENCE: media-service
      JWT_ISSUER: tq-chat-platform
      MEDIA_SERVER_URL: http://192.168.43.248:3001
      MESSAGING_SERVER_URL: http://localhost:8081
      URL_SIGNING_SECRET: super-secure-long-dev-secret-key-change-in-prod
    depends_on:
      - postgres
    networks:
      - chat-network

  rtc-server:
    build:
      context: ./services/rtc-server
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
    networks:
      - chat-network

volumes:
  postgres_data:
  media_uploads:

networks:
  chat-network:
    driver: bridge
