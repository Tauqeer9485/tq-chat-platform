# Spring Boot Configuration
# Copy this file to application.properties and fill in your actual values

# Server Port (REST API)
server.port=8081

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/your-database-name
spring.datasource.username=your-db-user
spring.datasource.password=your-db-password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - CHANGE THIS TO A STRONG SECRET (min 32 chars)
jwt.secret=your-strong-secret-key-min-32-characters-long
jwt.expiration=604800000

# Logging
logging.level.root=INFO
logging.level.com.chat=DEBUG
